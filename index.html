<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Split Expense Calculator</title>
    <style>
        :root {
            --bg-color: #f0f7fc;
            --card-bg: #ffffff;
            --primary-blue: #007acc;
            --light-blue: #e1f0fa;
            --accent-blue: #4da3ff;
            --text-dark: #2c3e50;
            --text-gray: #7f8c8d;
            --danger-red: #e74c3c;
            --success-green: #2ecc71;
            --orange-alert: #e67e22;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            display: flex;
            gap: 24px;
            width: 100%;
            max-width: 920px;
            align-items: flex-start;
            justify-content: center;
        }

        .calculator-card {
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 122, 204, 0.12);
            width: 100%;
            max-width: 420px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            flex-shrink: 0;
        }

        .history-card {
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 122, 204, 0.12);
            width: 100%;
            max-width: 450px;
            min-height: 680px;
            max-height: 720px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px dashed var(--light-blue);
            padding-bottom: 10px;
        }

        .history-title {
            color: var(--primary-blue);
            font-size: 1.2rem;
            font-weight: 700;
        }

        .export-group {
            display: flex;
            gap: 6px;
        }

        .btn-export {
            padding: 6px 12px;
            font-size: 0.8rem;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: #ffffff;
            transition: opacity 0.15s ease;
        }
        .btn-export.excel { background-color: #217346; }
        .btn-export.pdf { background-color: #f40612; }
        .btn-export.clear-all { background-color: var(--text-gray); }
        .btn-export:hover { opacity: 0.85; }

        .names-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            max-height: 110px;
            overflow-y: auto;
            background: #fdfefe;
            border: 1px solid var(--light-blue);
            border-radius: 12px;
            padding: 8px;
        }

        .payer-select-wrapper {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .select-input {
            width: 100%;
            padding: 10px;
            font-size: 0.95rem;
            border: 2px solid var(--light-blue);
            border-radius: 12px;
            color: var(--text-dark);
            background-color: #ffffff;
            outline: none;
        }
        .select-input:focus { border-color: var(--accent-blue); }

        .settlement-card {
            background: #fffbf4;
            border: 1px solid #ffeacc;
            border-radius: 16px;
            padding: 14px;
        }
        .settlement-hdr {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--orange-alert);
            margin-bottom: 6px;
            letter-spacing: 0.03em;
        }
        .settlement-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 0.88rem;
        }
        .settlement-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            border-bottom: 1px dashed #f5ecd5;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-item {
            background: #f8fbfe;
            border: 1px solid var(--light-blue);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .history-item:hover {
            background: var(--light-blue);
            border-color: var(--accent-blue);
            transform: translateY(-1px);
        }

        .item-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
            max-width: 70%;
        }
        .item-desc { font-weight: 600; color: var(--text-dark); font-size: 0.95rem; }
        .item-meta { font-size: 0.75rem; color: var(--text-gray); font-weight: 500; }
        .item-meta b { color: var(--primary-blue); }
        .item-cost { font-weight: 700; color: var(--primary-blue); font-size: 1.1rem; }

        .empty-history {
            text-align: center;
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-top: 30px;
            font-style: italic;
        }

        h2 { text-align: center; color: var(--primary-blue); font-size: 1.4rem; font-weight: 700; }

        .result-box {
            background: linear-gradient(135deg, #007acc 0%, #005999 100%);
            border-radius: 18px;
            padding: 16px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0, 122, 204, 0.2);
        }
        .result-label { font-size: 0.85rem; color: rgba(255, 255, 255, 0.85); font-weight: 600; text-transform: uppercase; }
        .result-amount { font-size: 2.2rem; font-weight: 800; color: #ffffff; }

        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .input-row-split { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        label { font-size: 0.75rem; color: var(--text-gray); font-weight: 700; text-transform: uppercase; }

        .calc-display {
            width: 100%;
            padding: 10px 14px;
            font-size: 1.4rem;
            border: 2px solid var(--light-blue);
            border-radius: 12px;
            text-align: right;
            color: var(--primary-blue);
            font-weight: 700;
            background-color: #fafdfb;
        }

        .text-input {
            width: 100%;
            padding: 10px 14px;
            font-size: 0.95rem;
            border: 2px solid var(--light-blue);
            border-radius: 12px;
            color: var(--text-dark);
        }
        .text-input:focus { outline: none; border-color: var(--accent-blue); }

        .people-controls {
            display: flex;
            align-items: center;
            background: #f4f9fd;
            border: 2px solid var(--light-blue);
            border-radius: 12px;
            padding: 2px;
        }
        .people-btn {
            background: transparent; border: none; color: var(--primary-blue);
            font-size: 1.4rem; width: 38px; height: 36px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        #peopleCount {
            flex: 1; border: none; background: transparent; text-align: center;
            font-size: 1.2rem; font-weight: 700; color: var(--text-dark); width: 100%;
        }
        #peopleCount:focus { outline: none; }
        #peopleCount::-webkit-outer-spin-button, #peopleCount::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .add-entry-btn {
            width: 100%;
            background-color: var(--success-green); color: white; border: none;
            padding: 12px; border-radius: 12px; font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: opacity 0.2s;
        }
        .add-entry-btn:hover { opacity: 0.9; }

        /* Keypad Mapping Layout Configurations */
        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(5, 46px);
            gap: 8px;
        }
        .btn {
            background-color: #f8fbfe; border: 1px solid var(--light-blue); border-radius: 12px;
            font-size: 1.15rem; font-weight: 600; cursor: pointer; color: var(--text-dark);
            display: flex; align-items: center; justify-content: center;
            user-select: none;
        }
        .btn:active { background-color: var(--light-blue); transform: scale(0.96); }
        .btn.operator { background-color: var(--light-blue); color: var(--primary-blue); font-size: 1.25rem;}
        .btn.clear { background-color: #ffebeb; color: var(--danger-red); border-color: #fdd8d8; }
        .btn.clear:active { background-color: #fdd8d8; }
        
        /* Enlarged operational button styles */
        .btn.equal { 
            background-color: var(--primary-blue); color: #ffffff; font-weight: 700; 
            grid-column: 4; grid-row: 3 / span 2; height: 100%; 
        }
        .btn.equal:active { background-color: #005999; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 40, 80, 0.4); backdrop-filter: blur(3px);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
            opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-box {
            background: white; padding: 24px; border-radius: 20px;
            width: 100%; max-width: 360px; box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            display: flex; flex-direction: column; gap: 16px;
        }
        .modal-title { font-weight: 700; color: var(--primary-blue); font-size: 1.15rem; }
        .modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px; }
        .modal-btn { padding: 10px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; }
        .modal-btn.save { background-color: var(--primary-blue); color: white; }
        .modal-btn.delete { background-color: var(--danger-red); color: white; }
        .modal-btn.cancel { background-color: var(--light-blue); color: var(--text-dark); grid-column: span 2; }

        @media print {
            body * { visibility: hidden; }
            .history-card, .history-card * { visibility: visible; }
            .history-card { position: absolute; left: 0; top: 0; width: 100%; box-shadow: none; max-height: none; }
            .export-group { display: none; }
        }

        @media (max-width: 768px) {
            .app-container { flex-direction: column; align-items: center; }
            .history-card { min-height: auto; max-height: 600px; width: 100%; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="calculator-card">
        <h2>Split Expense</h2>

        <div class="result-box">
            <div class="result-label">Each Person Share</div>
            <div class="result-amount" id="splitResult">₹0.00</div>
        </div>

        <div class="input-row-split">
            <div class="input-group">
                <label for="peopleCount">No. of People</label>
                <div class="people-controls">
                    <button class="people-btn" onclick="stepPeople(-1)" type="button">−</button>
                    <input type="number" id="peopleCount" value="2" min="1" max="50" autocomplete="off">
                    <button class="people-btn" onclick="stepPeople(1)" type="button">+</button>
                </div>
            </div>

            <div class="input-group payer-select-wrapper">
                <label for="billPayer">Who Paid?</label>
                <select id="billPayer" class="select-input"></select>
            </div>
        </div>

        <div class="input-group">
            <label>Assign Names</label>
            <div class="names-grid" id="namesContainer"></div>
        </div>

        <div class="input-group">
            <label for="billDisplay">Amount / Formula</label>
            <input type="text" id="billDisplay" class="calc-display" value="0" inputmode="none" autocomplete="off">
        </div>

        <div class="input-group">
            <label for="billDesc">Description / Tag</label>
            <input type="text" id="billDesc" class="text-input" placeholder="e.g., Dinner, Fuel, Hotel" autocomplete="off">
        </div>

        <div class="action-row">
            <button class="add-entry-btn" onclick="addExpenseItem()">Add to Log (+)</button>
        </div>

        <div class="keypad">
            <button class="btn clear" onclick="clearDisplay()">C</button>
            <button class="btn operator" onclick="pressKey('/')">÷</button>
            <button class="btn operator" onclick="pressKey('*')">×</button>
            <button class="btn operator" onclick="pressKey('-')">−</button>

            <button class="btn" onclick="pressKey('7')">7</button>
            <button class="btn" onclick="pressKey('8')">8</button>
            <button class="btn" onclick="pressKey('9')">9</button>
            <button class="btn operator" onclick="pressKey('+')">+</button>

            <button class="btn" onclick="pressKey('4')">4</button>
            <button class="btn" onclick="pressKey('5')">5</button>
            <button class="btn" onclick="pressKey('6')">6</button>
            <button class="btn equal" onclick="calculateTotal()">=</button>

            <button class="btn" onclick="pressKey('1')">1</button>
            <button class="btn" onclick="pressKey('2')">2</button>
            <button class="btn" onclick="pressKey('3')">3</button>

            <button class="btn" onclick="pressKey('.')">.</button>
            <button class="btn" onclick="pressKey('0')">0</button>
            <button class="btn clear" onclick="eraseLastDigit()">⌫</button>
        </div>
    </div>

    <div class="history-card">
        <div class="history-header">
            <span class="history-title">Logs & Settlements</span>
            <div class="export-group">
                <button class="btn-export excel" onclick="exportToExcel()">Excel</button>
                <button class="btn-export pdf" onclick="exportToPDF()">PDF</button>
                <button class="btn-export clear-all" onclick="clearAllLogs()">Reset</button>
            </div>
        </div>

        <div class="settlement-card" id="settlementBox" style="display: none;">
            <div class="settlement-hdr">Who Owes Whom Report</div>
            <ul class="settlement-list" id="settlementList"></ul>
        </div>

        <div id="historyTotal" style="font-weight: 700; color: var(--text-dark); font-size: 0.95rem; text-align: right;">Total Logged: ₹0.00</div>
        
        <div class="history-list" id="historyList">
            <div class="empty-history">No logs recorded yet.</div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="editModal">
    <div class="modal-box">
        <div class="modal-title">Modify Log Entry</div>
        
        <div class="input-group">
            <label for="modalPayer">Who Paid</label>
            <select id="modalPayer" class="select-input"></select>
        </div>

        <div class="input-group">
            <label for="modalAmount">Amount / Formula</label>
            <input type="text" id="modalAmount" class="text-input" inputmode="none">
        </div>

        <div class="input-group">
            <label for="modalDesc">Description</label>
            <input type="text" id="modalDesc" class="text-input">
        </div>

        <div class="modal-actions">
            <button class="modal-btn save" onclick="saveModalEdit()">Save Changes</button>
            <button class="modal-btn delete" onclick="deleteModalItem()">Delete</button>
            <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<script>
    const display = document.getElementById('billDisplay');
    const descriptionInput = document.getElementById('billDesc');
    const payerSelect = document.getElementById('billPayer');
    const peopleInput = document.getElementById('peopleCount');
    const namesContainer = document.getElementById('namesContainer');
    const splitResult = document.getElementById('splitResult');
    const historyList = document.getElementById('historyList');
    const historyTotalLabel = document.getElementById('historyTotal');
    const settlementBox = document.getElementById('settlementBox');
    const settlementList = document.getElementById('settlementList');

    const editModal = document.getElementById('editModal');
    const modalAmount = document.getElementById('modalAmount');
    const modalDesc = document.getElementById('modalDesc');
    const modalPayer = document.getElementById('modalPayer');

    let expenseLog = JSON.parse(localStorage.getItem('splitExpenseLog')) || [];
    let memberNames = JSON.parse(localStorage.getItem('splitMemberNames')) || ["Person 1", "Person 2"];
    let selectedItemIdx = null;
    let isEvaluated = false;

    window.addEventListener('DOMContentLoaded', () => {
        peopleInput.value = memberNames.length;
        buildNamesInputs();
        renderHistoryList();
        calculateSplit();
    });

    peopleInput.addEventListener('input', () => {
        let val = parseInt(peopleInput.value) || 1;
        if(val < 1) { val = 1; peopleInput.value = 1; }
        adjustNamesArray(val);
        buildNamesInputs();
        calculateSplit();
    });

    function adjustNamesArray(targetLen) {
        if(memberNames.length < targetLen) {
            for(let i = memberNames.length; i < targetLen; i++) {
                memberNames.push(`Person ${i + 1}`);
            }
        } else if(memberNames.length > targetLen) {
            memberNames = memberNames.slice(0, targetLen);
        }
        localStorage.setItem('splitMemberNames', JSON.stringify(memberNames));
    }

    function buildNamesInputs() {
        namesContainer.innerHTML = '';
        memberNames.forEach((name, index) => {
            let input = document.createElement('input');
            input.type = 'text';
            input.className = 'text-input';
            input.style.padding = '6px 10px';
            input.style.fontSize = '0.85rem';
            input.value = name;
            input.autocomplete = 'off';
            input.addEventListener('input', (e) => {
                memberNames[index] = e.target.value.trim() || `Person ${index + 1}`;
                localStorage.setItem('splitMemberNames', JSON.stringify(memberNames));
                updatePayerDropdowns();
            });
            namesContainer.appendChild(input);
        });
        updatePayerDropdowns();
    }

    function updatePayerDropdowns() {
        let currentSelected = payerSelect.value;
        payerSelect.innerHTML = '';
        memberNames.forEach(name => {
            let opt = document.createElement('option');
            opt.value = name;
            opt.innerText = name;
            payerSelect.appendChild(opt);
        });
        if(memberNames.includes(currentSelected)) {
            payerSelect.value = currentSelected;
        }
    }

    function pressKey(key) {
        if (display.value === '0' && key !== '.') {
            display.value = key;
        } else {
            if (isEvaluated && !isNaN(key)) {
                display.value = key;
            } else {
                display.value += key;
            }
        }
        isEvaluated = false;
        calculateSplit();
    }

    function clearDisplay() {
        display.value = '0';
        descriptionInput.value = '';
        calculateSplit();
    }

    function eraseLastDigit() {
        if (display.value.length > 1) {
            display.value = display.value.slice(0, -1);
        } else {
            display.value = '0';
        }
        calculateSplit();
    }

    function stepPeople(change) {
        let current = parseInt(peopleInput.value) || 0;
        current += change;
        if (current < 1) current = 1;
        peopleInput.value = current;
        adjustNamesArray(current);
        buildNamesInputs();
        calculateSplit();
    }

    function parseExpression(str) {
        let normalized = str.replace(/[^0-9+\-*/. ]/g, '');
        if (normalized.trim() === '') return 0;
        return Function(`'use strict'; return (${normalized})`)();
    }

    function calculateTotal() {
        try {
            if(display.value.trim() === "") return;
            let result = parseExpression(display.value);
            display.value = Number(result.toFixed(2));
            isEvaluated = true;
            calculateSplit();
        } catch (e) {}
    }

    function calculateSplit() {
        let peopleCount = memberNames.length || 1;
        let activeTotal = 0;
        try {
            activeTotal = parseExpression(display.value);
            if (isNaN(activeTotal) || !isFinite(activeTotal)) activeTotal = 0;
        } catch (e) {}

        let aggregateLogSum = expenseLog.reduce((sum, item) => sum + item.computedValue, 0);
        let absoluteCombinedTotal = activeTotal + aggregateLogSum;

        let share = absoluteCombinedTotal / peopleCount;
        
        splitResult.innerText = `₹${share.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
        historyTotalLabel.innerText = `Total Logged: ₹${absoluteCombinedTotal.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
        
        recalculateSettlements(absoluteCombinedTotal, share);
    }

    function recalculateSettlements(totalExpense, sharePerPerson) {
        if (expenseLog.length === 0) {
            settlementBox.style.display = 'none';
            return;
        }

        settlementBox.style.display = 'block';
        settlementList.innerHTML = '';

        let paidMap = {};
        memberNames.forEach(n => paidMap[n] = 0);
        
        expenseLog.forEach(item => {
            if (paidMap[item.payer] !== undefined) {
                paidMap[item.payer] += item.computedValue;
            } else {
                paidMap[item.payer] = item.computedValue;
            }
        });

        let balances = [];
        for (let name in paidMap) {
            balances.push({ name: name, bal: paidMap[name] - sharePerPerson });
        }

        let creditors = balances.filter(b => b.bal > 0).sort((a,b) => b.bal - a.bal);
        let debtors = balances.filter(b => b.bal < 0).sort((a,b) => a.bal - b.bal);

        let settlementHTML = '';

        let i = 0, j = 0;
        while (i < debtors.length && j < creditors.length) {
            let oweAmt = Math.abs(debtors[i].bal);
            let getAmt = creditors[j].bal;
            let transaction = Math.min(oweAmt, getAmt);

            if(transaction > 0.01) {
                settlementHTML += `
                    <li class="settlement-row">
                        <span><b>${debtors[i].name}</b> pays <b>${creditors[j].name}</b></span>
                        <span style="font-weight:700; color:var(--danger-red);">₹${transaction.toFixed(2)}</span>
                    </li>`;
            }

            debtors[i].bal += transaction;
            creditors[j].bal -= transaction;

            if (Math.abs(debtors[i].bal) < 0.01) i++;
            if (creditors[j].bal < 0.01) j++;
        }

        if(settlementHTML === '') {
            settlementList.innerHTML = `<li style="text-align:center; color:var(--text-gray); font-size:0.8rem;">Balances are perfectly aligned!</li>`;
        } else {
            settlementList.innerHTML = settlementHTML;
        }
    }

    function addExpenseItem() {
        let expression = display.value.trim();
        let description = descriptionInput.value.trim() || "Expense Item";
        let payer = payerSelect.value;

        if(!payer) return alert("Please assign a valid name or person profile first.");

        let computedValue = 0;
        try {
            computedValue = parseExpression(expression);
            if (isNaN(computedValue) || computedValue <= 0) return; 
        } catch (e) { return; }

        expenseLog.push({
            expression: expression,
            description: description,
            payer: payer,
            computedValue: parseFloat(computedValue.toFixed(2))
        });

        localStorage.setItem('splitExpenseLog', JSON.stringify(expenseLog));

        display.value = "0";
        descriptionInput.value = "";
        
        renderHistoryList();
        calculateSplit();
    }

    function renderHistoryList() {
        if (expenseLog.length === 0) {
            historyList.innerHTML = '<div class="empty-history">No logs recorded yet.</div>';
            return;
        }

        historyList.innerHTML = '';
        expenseLog.forEach((item, index) => {
            let row = document.createElement('div');
            row.className = 'history-item';
            row.setAttribute('onclick', `openEditModal(${index})`);
            
            row.innerHTML = `
                <div class="item-details">
                    <span class="item-desc">${item.description}</span>
                    <span class="item-meta">Paid by: <b>${item.payer}</b> (${item.expression})</span>
                </div>
                <div class="item-cost">₹${item.computedValue.toFixed(2)}</div>
            `;
            historyList.appendChild(row);
        });
    }

    function openEditModal(index) {
        selectedItemIdx = index;
        let item = expenseLog[index];
        
        modalPayer.innerHTML = '';
        memberNames.forEach(name => {
            let opt = document.createElement('option');
            opt.value = name; opt.innerText = name;
            modalPayer.appendChild(opt);
        });

        modalAmount.value = item.expression;
        modalDesc.value = item.description;
        modalPayer.value = item.payer;
        editModal.classList.add('active');
    }

    function closeModal() {
        editModal.classList.remove('active');
        selectedItemIdx = null;
    }

    function saveModalEdit() {
        if (selectedItemIdx === null) return;
        
        let newExpr = modalAmount.value.trim();
        let newDesc = modalDesc.value.trim() || "Expense Item";
        let newPayer = modalPayer.value;
        
        try {
            let val = parseExpression(newExpr);
            if (!isNaN(val) && val >= 0) {
                expenseLog[selectedItemIdx].expression = newExpr;
                expenseLog[selectedItemIdx].description = newDesc;
                expenseLog[selectedItemIdx].payer = newPayer;
                expenseLog[selectedItemIdx].computedValue = parseFloat(val.toFixed(2));
                localStorage.setItem('splitExpenseLog', JSON.stringify(expenseLog));
            }
        } catch(e) {}

        closeModal();
        renderHistoryList();
        calculateSplit();
    }

    function deleteModalItem() {
        if (selectedItemIdx === null) return;
        expenseLog.splice(selectedItemIdx, 1);
        localStorage.setItem('splitExpenseLog', JSON.stringify(expenseLog));
        
        closeModal();
        renderHistoryList();
        calculateSplit();
    }

    function clearAllLogs() {
        if(confirm("Are you sure you want to clear all logged sessions?")) {
            expenseLog = [];
            localStorage.removeItem('splitExpenseLog');
            clearDisplay();
            renderHistoryList();
            calculateSplit();
        }
    }

    function exportToExcel() {
        if(expenseLog.length === 0) return alert("Nothing to export yet!");
        let csvContent = "data:text/csv;charset=utf-8,Description,Payer Profiles,Formula String,Computed Value (INR)\r\n";
        
        expenseLog.forEach(row => {
            csvContent += `"${row.description}","${row.payer}","${row.expression}",${row.computedValue}\r\n`;
        });
        
        let totalSum = expenseLog.reduce((sum, item) => sum + item.computedValue, 0);
        csvContent += `\r\nAggregate Total,,,${totalSum}\r\n`;
        csvContent += `Per Person Share (Split among ${memberNames.length}),,,${(totalSum / memberNames.length).toFixed(2)}\r\n`;

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "Split_Expenses_Report.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function exportToPDF() {
        if(expenseLog.length === 0) return alert("Nothing to print yet!");
        window.print();
    }
</script>

</body>
</html>
